<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCANE TEXT — 로그인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── 변수 ────────────────────────────────────────── */
:root {
  --bg:        #f5f2ee;
  --bg2:       #ede9e3;
  --surface:   #ffffff;
  --border:    #d8d2c8;
  --border2:   #c4bdb2;
  --text:      #1c1917;
  --text2:     #6b6560;
  --text3:     #9c9590;
  --accent:    #b5451b;
  --accent2:   #c8682a;
  --accent-bg: #fdf1ec;
  --gold:      #9a7c3f;
  --gold-bg:   #faf6ec;
  --success:   #3a7c52;
  --error:     #c0392b;
  --shadow:    0 2px 12px rgba(28,25,23,.08);
  --shadow2:   0 8px 32px rgba(28,25,23,.12);
  --r:         10px;
}

/* ── 리셋 ────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow-x: hidden;
}

/* ── 배경 장식 ───────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 10% 20%, rgba(181,69,27,.06) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 90% 80%, rgba(154,124,63,.07) 0%, transparent 70%);
  pointer-events: none;
}

/* ── 루트 그리드 패턴 ────────────────────────────── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(28,25,23,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(28,25,23,.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* ── 래퍼 ────────────────────────────────────────── */
.wrapper {
  width: 100%;
  max-width: 440px;
  position: relative;
  z-index: 1;
}

/* ── 헤더 ────────────────────────────────────────── */
.brand {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeDown .5s ease both;
}
.brand-title {
  font-family: 'Cinzel', serif;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: .12em;
  color: var(--text);
  line-height: 1;
}
.brand-title span {
  color: var(--accent);
}
.brand-sub {
  font-size: .75rem;
  color: var(--text3);
  letter-spacing: .2em;
  text-transform: uppercase;
  margin-top: 6px;
}

/* ── 탭 ─────────────────────────────────────────── */
.tab-bar {
  display: flex;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 4px;
  margin-bottom: 24px;
  animation: fadeDown .5s .08s ease both;
}
.tab-btn {
  flex: 1;
  padding: 9px 0;
  border: none;
  background: transparent;
  border-radius: calc(var(--r) - 3px);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .82rem;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all .22s ease;
  letter-spacing: .04em;
}
.tab-btn.active {
  background: var(--surface);
  color: var(--accent);
  box-shadow: var(--shadow);
}

/* ── 카드 ────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 32px 28px;
  box-shadow: var(--shadow2);
  animation: fadeUp .45s .12s ease both;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 100%);
}

/* ── 폼 제목 ─────────────────────────────────────── */
.form-title {
  font-family: 'Cinzel', serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 24px;
  letter-spacing: .06em;
}

/* ── 필드 ────────────────────────────────────────── */
.field {
  margin-bottom: 16px;
}
.field label {
  display: block;
  font-size: .75rem;
  font-weight: 500;
  color: var(--text2);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.field input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .88rem;
  color: var(--text);
  background: var(--bg);
  transition: border-color .18s, box-shadow .18s, background .18s;
  outline: none;
}
.field input:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(181,69,27,.1);
}
.field input::placeholder { color: var(--text3); }

/* 비밀번호 토글 래퍼 */
.pw-wrap { position: relative; }
.pw-toggle {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer; color: var(--text3);
  font-size: .9rem; padding: 2px;
  transition: color .15s;
}
.pw-toggle:hover { color: var(--accent); }

/* ── 힌트 텍스트 ─────────────────────────────────── */
.hint {
  font-size: .72rem;
  color: var(--text3);
  margin-top: 4px;
  line-height: 1.5;
}

/* ── 구분선 ──────────────────────────────────────── */
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 20px 0;
  color: var(--text3);
  font-size: .72rem;
  letter-spacing: .1em;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── 버튼 ────────────────────────────────────────── */
.btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 7px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s ease;
  letter-spacing: .04em;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background .15s;
}
.btn:hover::after { background: rgba(255,255,255,.1); }
.btn:active { transform: scale(.985); }

.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #fff;
  box-shadow: 0 4px 14px rgba(181,69,27,.25);
}
.btn-primary:hover {
  box-shadow: 0 6px 20px rgba(181,69,27,.35);
  transform: translateY(-1px);
}
.btn-primary:disabled {
  opacity: .55;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1.5px solid var(--border);
}
.btn-ghost:hover {
  border-color: var(--border2);
  color: var(--text);
  background: var(--bg2);
}

/* ── 로딩 스피너 ─────────────────────────────────── */
.btn-primary.loading {
  color: transparent;
  pointer-events: none;
}
.btn-primary.loading::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 18px; height: 18px;
  margin: -9px 0 0 -9px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

/* ── 알림 ────────────────────────────────────────── */
.alert {
  padding: 11px 14px;
  border-radius: 7px;
  font-size: .82rem;
  margin-bottom: 16px;
  display: none;
  align-items: flex-start;
  gap: 8px;
  line-height: 1.5;
}
.alert.show { display: flex; animation: fadeIn .2s ease; }
.alert-error  { background: #fef2f2; border: 1px solid #fecaca; color: var(--error); }
.alert-success{ background: #f0fdf4; border: 1px solid #bbf7d0; color: var(--success); }
.alert-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

/* ── 비밀번호 강도 ───────────────────────────────── */
.strength-bar {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}
.strength-seg {
  flex: 1; height: 3px;
  background: var(--border);
  border-radius: 2px;
  transition: background .3s;
}
.strength-seg.weak   { background: #ef4444; }
.strength-seg.medium { background: #f59e0b; }
.strength-seg.strong { background: var(--success); }
.strength-label {
  font-size: .68rem;
  color: var(--text3);
  margin-top: 4px;
}

/* ── 약관 ────────────────────────────────────────── */
.agree-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 20px;
}
.agree-row input[type=checkbox] {
  width: 16px; height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 2px;
}
.agree-row label {
  font-size: .78rem;
  color: var(--text2);
  cursor: pointer;
  line-height: 1.5;
}
.agree-row a { color: var(--accent); text-decoration: none; }
.agree-row a:hover { text-decoration: underline; }

/* ── 푸터 ────────────────────────────────────────── */
.card-footer {
  text-align: center;
  margin-top: 20px;
  font-size: .78rem;
  color: var(--text3);
}
.card-footer a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}
.card-footer a:hover { text-decoration: underline; }

/* ── 장식 문자 ───────────────────────────────────── */
.deco-corner {
  position: absolute;
  bottom: 16px; right: 20px;
  font-family: 'Cinzel', serif;
  font-size: .65rem;
  color: var(--border2);
  letter-spacing: .15em;
  pointer-events: none;
  user-select: none;
}

/* ── 애니메이션 ──────────────────────────────────── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── 패널 전환 ───────────────────────────────────── */
.panel { display: none; }
.panel.active { display: block; }
</style>
</head>
<body>

<div class="wrapper">

  <!-- 브랜드 -->
  <div class="brand">
    <div class="brand-title">ARC<span>A</span>NE TEXT</div>
    <div class="brand-sub">Turn-based RPG · Web & Discord</div>
  </div>

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('login')">로그인</button>
    <button class="tab-btn"        onclick="switchTab('register')">회원가입</button>
  </div>

  <!-- 카드 -->
  <div class="card">

    <!-- ── 로그인 패널 ────────────────────────────── -->
    <div id="panel-login" class="panel active">
      <div class="form-title">환영합니다</div>

      <div id="login-alert" class="alert alert-error">
        <span class="alert-icon">⚠</span>
        <span id="login-alert-msg"></span>
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="field">
          <label>아이디 또는 이메일</label>
          <input type="text" id="login-ident" placeholder="username 또는 email" autocomplete="username" required>
        </div>

        <div class="field">
          <label>비밀번호</label>
          <div class="pw-wrap">
            <input type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('login-pw', this)">👁</button>
          </div>
        </div>

        <div style="margin-bottom:20px;"></div>

        <button type="submit" class="btn btn-primary" id="login-btn">로그인</button>
      </form>

      <div class="divider">또는</div>

      <button class="btn btn-ghost" onclick="demoLogin()">체험용 계정으로 시작</button>

      <div class="card-footer" style="margin-top:16px;">
        계정이 없으신가요? <a href="#" onclick="switchTab('register'); return false;">회원가입</a>
      </div>
    </div>

    <!-- ── 회원가입 패널 ──────────────────────────── -->
    <div id="panel-register" class="panel">
      <div class="form-title">새 모험가 등록</div>

      <div id="reg-alert" class="alert alert-error">
        <span class="alert-icon">⚠</span>
        <span id="reg-alert-msg"></span>
      </div>
      <div id="reg-success" class="alert alert-success">
        <span class="alert-icon">✓</span>
        <span id="reg-success-msg"></span>
      </div>

      <form id="register-form" onsubmit="handleRegister(event)">

        <div class="field">
          <label>아이디</label>
          <input type="text" id="reg-username" placeholder="영문·숫자·밑줄, 2~20자"
                 autocomplete="username" oninput="validateUsernameField(this)" required>
          <div class="hint" id="username-hint"></div>
        </div>

        <div class="field">
          <label>이메일</label>
          <input type="email" id="reg-email" placeholder="example@email.com"
                 autocomplete="email" required>
        </div>

        <div class="field">
          <label>비밀번호</label>
          <div class="pw-wrap">
            <input type="password" id="reg-pw" placeholder="8자 이상, 영문+숫자 포함"
                   autocomplete="new-password" oninput="checkStrength(this)" required>
            <button type="button" class="pw-toggle" onclick="togglePw('reg-pw', this)">👁</button>
          </div>
          <div class="strength-bar" id="strength-bar">
            <div class="strength-seg" id="seg1"></div>
            <div class="strength-seg" id="seg2"></div>
            <div class="strength-seg" id="seg3"></div>
          </div>
          <div class="strength-label" id="strength-label"></div>
        </div>

        <div class="field">
          <label>비밀번호 확인</label>
          <div class="pw-wrap">
            <input type="password" id="reg-pw2" placeholder="비밀번호 재입력"
                   autocomplete="new-password" oninput="checkConfirm(this)" required>
            <button type="button" class="pw-toggle" onclick="togglePw('reg-pw2', this)">👁</button>
          </div>
          <div class="hint" id="confirm-hint"></div>
        </div>

        <div class="agree-row">
          <input type="checkbox" id="agree" required>
          <label for="agree">
            <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의합니다.
          </label>
        </div>

        <button type="submit" class="btn btn-primary" id="reg-btn">모험 시작하기</button>

      </form>

      <div class="card-footer">
        이미 계정이 있으신가요? <a href="#" onclick="switchTab('login'); return false;">로그인</a>
      </div>
    </div>

    <div class="deco-corner">ARCANE TEXT v0.3</div>
  </div>

</div>

<script>
// ── 설정 ─────────────────────────────────────────────────────────────────────
const API = 'https://solutions-near-topics-extraction.trycloudflare.com';

// ── 탭 전환 ──────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0) === (tab === 'login'));
  });
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-register').classList.toggle('active', tab === 'register');
  hideAlert('login-alert');
  hideAlert('reg-alert');
  hideAlert('reg-success');
}

// ── 비밀번호 토글 ─────────────────────────────────────────────────────────────
function togglePw(id, btn) {
  const el = document.getElementById(id);
  const show = el.type === 'password';
  el.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

// ── 알림 ──────────────────────────────────────────────────────────────────────
function showAlert(id, msg) {
  const el = document.getElementById(id);
  const msgEl = el.querySelector('span:last-child') || document.getElementById(id + '-msg');
  if (msgEl) msgEl.textContent = msg;
  el.classList.add('show');
}
function hideAlert(id) {
  document.getElementById(id)?.classList.remove('show');
}

// ── 아이디 유효성 실시간 체크 ────────────────────────────────────────────────
function validateUsernameField(el) {
  const v   = el.value.trim();
  const hint = document.getElementById('username-hint');
  if (!v) { hint.textContent = ''; return; }
  if (v.length < 2)               hint.textContent = '⚠ 2자 이상 입력하세요.';
  else if (v.length > 20)         hint.textContent = '⚠ 20자 이하로 입력하세요.';
  else if (!/^[a-zA-Z0-9_]+$/.test(v)) hint.textContent = '⚠ 영문, 숫자, 밑줄(_)만 사용 가능합니다.';
  else                             hint.textContent = '✓ 사용 가능한 아이디입니다.';
  hint.style.color = hint.textContent.startsWith('✓') ? 'var(--success)' : 'var(--error)';
}

// ── 비밀번호 강도 ─────────────────────────────────────────────────────────────
function checkStrength(el) {
  const v = el.value;
  let score = 0;
  if (v.length >= 8)              score++;
  if (/[A-Z]/.test(v) || /[!@#$%^&*]/.test(v)) score++;
  if (/[0-9]/.test(v) && /[A-Za-z]/.test(v))    score++;

  const segs   = [document.getElementById('seg1'), document.getElementById('seg2'), document.getElementById('seg3')];
  const labels = ['', '취약', '보통', '강함'];
  const cls    = ['', 'weak', 'medium', 'strong'];

  segs.forEach((s, i) => {
    s.className = 'strength-seg' + (i < score ? ' ' + cls[score] : '');
  });
  document.getElementById('strength-label').textContent = v ? labels[score] : '';
  document.getElementById('strength-label').style.color =
    score === 1 ? 'var(--error)' : score === 2 ? '#d97706' : 'var(--success)';
}

// ── 비밀번호 확인 ────────────────────────────────────────────────────────────
function checkConfirm(el) {
  const pw  = document.getElementById('reg-pw').value;
  const hint = document.getElementById('confirm-hint');
  if (!el.value) { hint.textContent = ''; return; }
  if (el.value === pw) {
    hint.textContent = '✓ 비밀번호가 일치합니다.';
    hint.style.color = 'var(--success)';
  } else {
    hint.textContent = '⚠ 비밀번호가 일치하지 않습니다.';
    hint.style.color = 'var(--error)';
  }
}

// ── 로그인 ────────────────────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  hideAlert('login-alert');
  const btn   = document.getElementById('login-btn');
  const ident = document.getElementById('login-ident').value.trim();
  const pw    = document.getElementById('login-pw').value;

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/auth/login`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username_or_email: ident, password: pw }),
    });
    const data = await res.json();

    if (!res.ok) {
      showAlert('login-alert', data.detail || '로그인에 실패했습니다.');
      return;
    }

    // 토큰 저장
    localStorage.setItem('access_token',  data.access_token);
    localStorage.setItem('refresh_token', data.refresh_token);
    localStorage.setItem('user_id',       data.user_id);
    localStorage.setItem('username',      data.username);

    // 이동 (추후 라우팅)
    window.location.href = 'index.html';

  } catch (err) {
    showAlert('login-alert', '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ── 회원가입 ──────────────────────────────────────────────────────────────────
async function handleRegister(e) {
  e.preventDefault();
  hideAlert('reg-alert');
  hideAlert('reg-success');

  const username = document.getElementById('reg-username').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const pw       = document.getElementById('reg-pw').value;
  const pw2      = document.getElementById('reg-pw2').value;

  // 클라이언트 검증
  if (!/^[a-zA-Z0-9_]{2,20}$/.test(username)) {
    showAlert('reg-alert', '아이디는 영문·숫자·밑줄로 2~20자여야 합니다.');
    return;
  }
  if (pw !== pw2) {
    showAlert('reg-alert', '비밀번호가 일치하지 않습니다.');
    return;
  }
  if (pw.length < 8 || !/[A-Za-z]/.test(pw) || !/[0-9]/.test(pw)) {
    showAlert('reg-alert', '비밀번호는 8자 이상, 영문+숫자를 포함해야 합니다.');
    return;
  }

  const btn = document.getElementById('reg-btn');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/auth/register`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username, email, password: pw }),
    });
    const data = await res.json();

    if (!res.ok) {
      showAlert('reg-alert', data.detail || '회원가입에 실패했습니다.');
      return;
    }

    document.getElementById('reg-success-msg').textContent =
      `${data.username}님, 환영합니다! 로그인 화면으로 이동합니다.`;
    showAlert('reg-success', '');
    document.getElementById('register-form').reset();
    setTimeout(() => switchTab('login'), 1800);

  } catch (err) {
    showAlert('reg-alert', '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ── 체험용 계정 ───────────────────────────────────────────────────────────────
function demoLogin() {
  document.getElementById('login-ident').value = 'demo';
  document.getElementById('login-pw').value    = 'demo1234';
  document.getElementById('login-form').dispatchEvent(new Event('submit', { cancelable: true }));
}

// ── 이미 로그인 상태라면 이동 ─────────────────────────────────────────────────
if (localStorage.getItem('access_token')) {
  window.location.href = 'index.html';
}
</script>

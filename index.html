<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCANE TEXT — 메인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f7f5f2;
  --bg2:      #edeae4;
  --surface:  #ffffff;
  --border:   #ddd8d0;
  --border2:  #c8c2b8;
  --text:     #1c1917;
  --text2:    #6b6560;
  --text3:    #9c9590;
  --accent:   #b5451b;
  --accent2:  #c8682a;
  --gold:     #9a7c3f;
  --gold-bg:  #faf6ec;
  --green:    #3a7c52;
  --green-bg: #f0fdf4;
  --blue:     #2563a8;
  --blue-bg:  #eff6ff;
  --shadow:   0 1px 4px rgba(28,25,23,.07);
  --shadow2:  0 4px 20px rgba(28,25,23,.10);
  --r:        10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── 네비 ─────────────────────────────── */
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 54px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-brand {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: .1em;
  color: var(--text);
}
.nav-brand span { color: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-username {
  font-size: .8rem;
  color: var(--text2);
  font-weight: 500;
}
.nav-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .78rem;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.nav-btn:hover { background: var(--bg2); color: var(--text); }
.nav-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.nav-btn.primary:hover { background: var(--accent2); }

/* ── 레이아웃 ──────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 24px;
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 20px;
}
@media (max-width: 800px) {
  .layout { grid-template-columns: 1fr; }
}

/* ── 섹션 헤더 ─────────────────────────── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Cinzel', serif;
  font-size: .95rem;
  font-weight: 600;
  letter-spacing: .06em;
  color: var(--text);
}
.section-sub {
  font-size: .75rem;
  color: var(--text3);
  margin-top: 2px;
}

/* ── 캐릭터 그리드 ─────────────────────── */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}

/* ── 캐릭터 카드 ───────────────────────── */
.char-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 18px 16px 14px;
  cursor: pointer;
  transition: all .2s ease;
  position: relative;
  user-select: none;
}
.char-card:hover {
  border-color: var(--border2);
  box-shadow: var(--shadow2);
  transform: translateY(-2px);
}
.char-card.selected {
  border-color: var(--accent);
  background: #fdf8f6;
}
.char-card.in-party {
  border-color: var(--green);
  background: var(--green-bg);
}

/* 카드 배지 */
.char-badge {
  position: absolute;
  top: 10px; right: 10px;
  font-size: .65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: .05em;
}
.badge-recruited {
  background: var(--gold-bg);
  color: var(--gold);
  border: 1px solid #e8d9a8;
}
.badge-maker {
  background: var(--blue-bg);
  color: var(--blue);
  border: 1px solid #bfd7f5;
}
.badge-party {
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid #a7d9bc;
}

/* 캐릭터 아바타 */
.char-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 12px;
  color: #fff;
}
.avatar-recruited { background: linear-gradient(135deg, var(--gold) 0%, #c4a055 100%); }
.avatar-maker { background: linear-gradient(135deg, var(--blue) 0%, #4a8fd4 100%); }

.char-name {
  font-size: .9rem;
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.char-meta {
  font-size: .72rem;
  color: var(--text2);
  margin-bottom: 12px;
}
.char-mastery-tag {
  display: inline-block;
  font-size: .65rem;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--bg2);
  color: var(--text2);
  border: 1px solid var(--border);
  margin-right: 3px;
  font-weight: 500;
}

/* 스탯 바 */
.stat-bars { display: flex; flex-direction: column; gap: 4px; }
.stat-row { display: flex; align-items: center; gap: 6px; }
.stat-label { font-size: .65rem; color: var(--text3); width: 14px; flex-shrink: 0; }
.stat-bar-bg {
  flex: 1; height: 4px;
  background: var(--bg2);
  border-radius: 2px;
  overflow: hidden;
}
.stat-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
  transition: width .4s ease;
}
.stat-val { font-size: .65rem; color: var(--text3); width: 20px; text-align: right; }

/* HP 표시 */
.char-hp {
  margin-top: 10px;
  font-size: .7rem;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.char-hp-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
}

/* 새 캐릭터 카드 */
.char-card-new {
  border: 1.5px dashed var(--border2);
  border-radius: var(--r);
  padding: 18px 16px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 180px;
  transition: all .2s;
  color: var(--text3);
  background: transparent;
  font-family: 'Noto Sans KR', sans-serif;
}
.char-card-new:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: #fdf8f6;
}
.new-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px dashed currentColor;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  line-height: 1;
}
.new-label { font-size: .8rem; font-weight: 500; }

/* ── 사이드바 ──────────────────────────── */
.sidebar { display: flex; flex-direction: column; gap: 20px; }

/* 파티 패널 */
.party-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.party-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.party-title {
  font-family: 'Cinzel', serif;
  font-size: .88rem;
  font-weight: 600;
  letter-spacing: .06em;
}
.party-count {
  font-size: .72rem;
  color: var(--text3);
  background: var(--bg2);
  padding: 2px 8px;
  border-radius: 10px;
}
.party-slots { padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; }
.party-slot {
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 56px;
  transition: all .15s;
  position: relative;
}
.party-slot.filled { border-color: var(--green); background: var(--green-bg); }
.party-slot.empty {
  border-style: dashed;
  color: var(--text3);
  justify-content: center;
  font-size: .78rem;
}
.slot-num {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--bg2);
  font-size: .65rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  flex-shrink: 0;
}
.party-slot.filled .slot-num { background: var(--green); color: #fff; }
.slot-info { flex: 1; min-width: 0; }
.slot-name { font-size: .82rem; font-weight: 600; }
.slot-meta { font-size: .68rem; color: var(--text2); }
.slot-remove {
  width: 20px; height: 20px;
  border: none; background: none;
  cursor: pointer;
  color: var(--text3);
  font-size: .9rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.slot-remove:hover { background: #fee2e2; color: #dc2626; }

/* 전투 버튼 */
.battle-btn {
  margin: 0 18px 16px;
  width: calc(100% - 36px);
  padding: 13px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .04em;
}
.battle-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(181,69,27,.3);
}
.battle-btn:disabled {
  opacity: .45;
  cursor: not-allowed;
  transform: none;
}

/* 정보 패널 */
.info-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px 18px;
  box-shadow: var(--shadow);
}
.info-title {
  font-size: .75rem;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 10px;
}
.info-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: .8rem;
}
.info-item:last-child { border-bottom: none; }
.info-key { color: var(--text2); }
.info-val { font-weight: 600; color: var(--text); }

/* ── 골드 뱃지 ─────────────────────────── */
.gold-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: .82rem; font-weight: 700;
  color: var(--gold);
  background: var(--gold-bg);
  border: 1px solid #e8d9a8;
  padding: 4px 12px; border-radius: 14px;
  letter-spacing: .02em;
}
.gold-icon { font-size: .85rem; }

/* ── 페이지 탭 ─────────────────────────── */
.page-tab-bar {
  display: flex; gap: 6px; margin-bottom: 18px;
}
.page-tab {
  padding: 7px 18px;
  border: 1.5px solid var(--border);
  border-radius: 20px; background: transparent;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .8rem; font-weight: 500;
  cursor: pointer; color: var(--text2);
  transition: all .15s;
}
.page-tab:hover { border-color: var(--border2); color: var(--text); background: var(--bg2); }
.page-tab.active { border-color: var(--accent); background: #fdf8f6; color: var(--accent); }

/* ── 강화 패널 ─────────────────────────── */
.upgrade-list { display: flex; flex-direction: column; gap: 12px; }
.upgrade-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
  transition: all .2s; box-shadow: var(--shadow);
}
.upgrade-card:hover { border-color: var(--border2); box-shadow: var(--shadow2); }
.upgrade-card-hdr {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.upgrade-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: .95rem; font-weight: 700;
  color: #fff; flex-shrink: 0;
}
.upgrade-info { flex: 1; min-width: 0; }
.upgrade-name { font-size: .88rem; font-weight: 700; margin-bottom: 2px; }
.upgrade-stage {
  font-size: .68rem; color: var(--text2);
  display: flex; align-items: center; gap: 5px;
}
.stage-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border);
}
.stage-dot.done { background: var(--green); }
.stage-dot.current { background: var(--gold); }

.upgrade-stats {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 6px; margin-bottom: 12px;
}
.upgrade-stat-box {
  background: var(--bg2); border-radius: 6px;
  padding: 7px; text-align: center;
}
.upgrade-stat-lbl { font-size: .6rem; color: var(--text3); margin-bottom: 2px; }
.upgrade-stat-val { font-size: .85rem; font-weight: 700; font-family: 'Cinzel', serif; }

.upgrade-action {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 10px; border-top: 1px solid var(--border);
}
.upgrade-cost {
  font-size: .78rem; color: var(--gold); font-weight: 600;
  display: flex; align-items: center; gap: 4px;
}
.upgrade-btn {
  padding: 7px 18px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; border: none; border-radius: 7px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .78rem; font-weight: 600;
  cursor: pointer; transition: all .18s; letter-spacing: .03em;
}
.upgrade-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(181,69,27,.25); }
.upgrade-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.upgrade-btn.maxed { background: var(--bg2); color: var(--text3); }

/* ── 페이지 패널 ───────────────────────── */
.page-panel { display: none; }
.page-panel.active { display: block; }

/* ── 상점 + 강화 슬라이더 ───────────────── */
.shop-grid{display:grid;grid-template-columns:1fr;gap:14px;}
.shop-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);transition:all .2s;}
.shop-card:hover{border-color:var(--border2);box-shadow:var(--shadow2);}
.shop-card-hdr{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.shop-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.shop-icon-scroll{background:#faf6ec;}.shop-icon-recruit{background:var(--blue-bg);}.shop-icon-enhance{background:var(--green-bg);}
.shop-item-name{font-size:.9rem;font-weight:700;margin-bottom:2px;}
.shop-item-desc{font-size:.72rem;color:var(--text2);line-height:1.5;}
.shop-item-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.shop-price{font-size:.85rem;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:4px;}
.shop-refund{font-size:.68rem;color:var(--text3);margin-left:6px;}
.shop-buy-btn{padding:7px 18px;border:none;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s;}
.shop-buy-btn:hover{transform:translateY(-1px);}
.shop-buy-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.shop-result-overlay{position:fixed;inset:0;background:rgba(28,25,23,.5);display:flex;align-items:center;justify-content:center;z-index:150;opacity:0;pointer-events:none;transition:opacity .25s;}
.shop-result-overlay.show{opacity:1;pointer-events:all;}
.shop-result-card{background:var(--surface);border-radius:14px;padding:30px 40px;text-align:center;box-shadow:var(--shadow2);min-width:280px;transform:scale(.9);transition:transform .25s;}
.shop-result-overlay.show .shop-result-card{transform:scale(1);}
.shop-result-icon{font-size:2.5rem;margin-bottom:10px;}
.shop-result-title{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;margin-bottom:6px;}
.shop-result-msg{font-size:.82rem;color:var(--text2);margin-bottom:6px;}
.shop-result-gold{font-size:.78rem;color:var(--gold);font-weight:600;margin-bottom:20px;}
.shop-result-close{padding:8px 28px;background:var(--accent);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:600;}
.enhance-select-list{display:flex;flex-direction:column;gap:8px;margin:12px 0;text-align:left;}
.enhance-select-item{padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.82rem;}
.enhance-select-item:hover{border-color:var(--accent);background:#fdf8f6;}
.upgrade-modal-overlay{position:fixed;inset:0;background:rgba(28,25,23,.5);display:flex;align-items:center;justify-content:center;z-index:150;opacity:0;pointer-events:none;transition:opacity .25s;}
.upgrade-modal-overlay.show{opacity:1;pointer-events:all;}
.upgrade-modal-card{background:var(--surface);border-radius:14px;padding:28px 32px;box-shadow:var(--shadow2);width:340px;transform:scale(.9);transition:transform .25s;}
.upgrade-modal-overlay.show .upgrade-modal-card{transform:scale(1);}
.upgrade-modal-title{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;margin-bottom:18px;}
.slider-row{margin-bottom:14px;}
.slider-label{display:flex;justify-content:space-between;align-items:center;font-size:.8rem;font-weight:600;margin-bottom:5px;}
.slider-label span{color:var(--accent);font-family:'Cinzel',serif;}
.slider-input{width:100%;height:6px;border-radius:3px;-webkit-appearance:none;appearance:none;background:var(--bg2);outline:none;cursor:pointer;}
.slider-input::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;}
.upgrade-points-left{text-align:center;font-size:.82rem;color:var(--text2);margin-bottom:16px;padding:8px;background:var(--bg2);border-radius:7px;}
.upgrade-points-left strong{color:var(--accent);font-family:'Cinzel',serif;}
.upgrade-modal-btns{display:flex;gap:8px;}
.upgrade-modal-btn{flex:1;padding:9px;border:none;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .18s;}
.upgrade-modal-btn.confirm{background:var(--accent);color:#fff;}
.upgrade-modal-btn.confirm:disabled{opacity:.4;cursor:not-allowed;}
.upgrade-modal-btn.cancel{background:var(--bg2);color:var(--text2);}
/* ── 스킬 교체 모달 ─────────────────────── */
.skill-swap-overlay{position:fixed;inset:0;background:rgba(28,25,23,.5);display:flex;align-items:center;justify-content:center;z-index:160;opacity:0;pointer-events:none;transition:opacity .25s;}
.skill-swap-overlay.show{opacity:1;pointer-events:all;}
.skill-swap-card{background:var(--surface);border-radius:14px;padding:24px 28px;box-shadow:var(--shadow2);width:380px;max-height:80vh;overflow-y:auto;transform:scale(.9);transition:transform .25s;}
.skill-swap-overlay.show .skill-swap-card{transform:scale(1);}
.skill-swap-title{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;margin-bottom:4px;}
.skill-swap-sub{font-size:.72rem;color:var(--text2);margin-bottom:14px;}
.skill-swap-section{margin-bottom:14px;}
.skill-swap-label{font-size:.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.skill-slot-row{display:flex;flex-direction:column;gap:6px;}
.skill-slot-btn{padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;background:transparent;text-align:left;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.skill-slot-btn:hover{border-color:var(--accent);background:#fdf8f6;}
.skill-slot-btn.selected{border-color:var(--accent);background:#fdf8f6;box-shadow:0 0 0 2px rgba(181,69,27,.15);}
.skill-slot-name{font-size:.8rem;font-weight:600;}
.skill-slot-meta{font-size:.65rem;color:var(--text3);margin-top:1px;}
.skill-pool-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.skill-pool-btn{padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;background:transparent;text-align:left;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.skill-pool-btn:hover:not(:disabled){border-color:var(--blue);background:var(--blue-bg);}
.skill-pool-btn:disabled{opacity:.35;cursor:not-allowed;}
.skill-swap-btns{display:flex;gap:8px;margin-top:14px;}
.skill-swap-btn{flex:1;padding:9px;border:none;border-radius:7px;font-family:'Noto Sans KR',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;}
.skill-swap-btn.confirm{background:var(--accent);color:#fff;}
.skill-swap-btn.confirm:disabled{opacity:.4;cursor:not-allowed;}
.skill-swap-btn.cancel{background:var(--bg2);color:var(--text2);}
/* ── 토스트 ────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: .82rem;
  transition: transform .25s ease;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── 빈 상태 ───────────────────────────── */
.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 48px 24px;
  color: var(--text3);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-title { font-size: .95rem; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
.empty-sub { font-size: .8rem; }

/* ── 로딩 ──────────────────────────────── */
.loading-grid {
  grid-column: 1/-1;
  display: flex;
  justify-content: center;
  padding: 48px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.char-card { animation: fadeIn .3s ease both; }
</style>
</head>
<body>

<!-- 네비 -->
<nav class="nav">
  <div class="nav-brand">ARC<span>A</span>NE TEXT</div>
  <div class="nav-right">
    <span class="nav-username" id="nav-username">로딩 중...</span>
    <div class="gold-badge" id="gold-badge">
      <span class="gold-icon">G</span>
      <span id="gold-amount">—</span>
    </div>
    <button class="nav-btn primary" onclick="location.href='maker.html'">+ 캐릭터 생성</button>
    <button class="nav-btn" onclick="handleLogout()">로그아웃</button>
  </div>
</nav>

<!-- 메인 레이아웃 -->
<div class="layout">

  <!-- 왼쪽: 캐릭터 목록 + 강화 -->
  <div>
    <div class="page-tab-bar">
      <button class="page-tab active" onclick="switchTab('chars', this)">캐릭터</button>
      <button class="page-tab"        onclick="switchTab('upgrade', this)">강화</button>
      <button class="page-tab"        onclick="switchTab('shop', this)">상점</button>
    </div>

    <!-- 캐릭터 목록 패널 -->
    <div class="page-panel active" id="panel-chars">
    <div class="section-header">
      <div>
        <div class="section-title">캐릭터</div>
        <div class="section-sub" id="char-count">불러오는 중...</div>
      </div>
    </div>

    <div class="char-grid" id="char-grid">
      <div class="loading-grid"><div class="spinner"></div></div>
    </div>
    </div><!-- /panel-chars -->

    <!-- 강화 패널 -->
    <div class="page-panel" id="panel-upgrade">
      <div class="upgrade-list" id="upgrade-list">
        <div style="text-align:center;padding:32px;color:var(--text3);font-size:.85rem;">
          캐릭터를 불러오는 중...
        </div>
      </div>
    </div><!-- /panel-upgrade -->

    <div class="page-panel" id="panel-shop">
      <div class="shop-grid" id="shop-grid">
        <div style="text-align:center;padding:32px;color:var(--text3);">로딩 중...</div>
      </div>
    </div>

  </div>

  <!-- 오른쪽: 파티 + 정보 -->
  <div class="sidebar">

    <!-- 파티 패널 -->
    <div class="party-panel">
      <div class="party-header">
        <span class="party-title">파티 편성</span>
        <span class="party-count" id="party-count">0 / 3</span>
      </div>
      <div class="party-slots" id="party-slots">
        <div class="party-slot empty" id="slot-0">슬롯 1 — 클릭하여 추가</div>
        <div class="party-slot empty" id="slot-1">슬롯 2 — 클릭하여 추가</div>
        <div class="party-slot empty" id="slot-2">슬롯 3 — 클릭하여 추가</div>
      </div>
      <button class="battle-btn" id="battle-btn" disabled onclick="startBattle()">
        전투 시작
      </button>
    </div>

    <!-- 전투 정보 -->
    <div class="info-panel">
      <div class="info-title">파티 정보</div>
      <div class="info-item">
        <span class="info-key">총 체력</span>
        <span class="info-val" id="info-hp">—</span>
      </div>
      <div class="info-item">
        <span class="info-key">평균 공격력</span>
        <span class="info-val" id="info-atk">—</span>
      </div>
      <div class="info-item">
        <span class="info-key">마스터리</span>
        <span class="info-val" id="info-mastery">—</span>
      </div>
      <div class="info-item">
        <span class="info-key">장착 스킬</span>
        <span class="info-val" id="info-skills">—</span>
      </div>
    </div>

  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
const API      = 'https://meteorically-unhalting-tom.ngrok-free.dev';
const token    = localStorage.getItem('access_token');
const userId   = localStorage.getItem('user_id');
const username = localStorage.getItem('username');

if (!token) location.href = 'auth.html';

document.getElementById('nav-username').textContent = username || '모험가';

// ── 골드 로드 ────────────────────────────────────────────────────────────────
async function loadGold() {
  try {
    const res  = await fetch(`${API}/character/gold/me`, {
      headers: { 'Authorization': `Bearer ${token}`, 'ngrok-skip-browser-warning': '1' },
      cache: 'no-store',
    });
    if (!res.ok) {
      console.warn('[gold] API 실패:', res.status, await res.text());
      return;
    }
    const data = await res.json();
    console.log('[gold] 응답:', data);
    const amount = data.gold ?? 0;
    document.getElementById('gold-amount').textContent = `${amount.toLocaleString()}G`;
  } catch(e) {
    console.error('[gold] 오류:', e);
  }
}

// ── 탭 전환 ─────────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.page-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
  if (tab === 'upgrade') renderUpgradePanel();
  if (tab === 'shop') renderShopPanel();
}

// ── 강화 패널 렌더 ────────────────────────────────────────────────────────────
const UPGRADE_COST = { 1: 150, 2: 300 };
const UPGRADE_STAT_CAP = { 0: 30, 1: 45, 2: 60 };
const AVATAR_COLORS = ['#b5451b','#2563a8','#3a7c52','#9a7c3f','#7c3a8a'];

function renderUpgradePanel() {
  const list = document.getElementById('upgrade-list');
  if (!characters.length) {
    list.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3);font-size:.85rem;">강화할 캐릭터가 없습니다.</div>';
    return;
  }

  list.innerHTML = characters.map((c, i) => {
    const stage    = c.growth_stage || 0;
    const isMaxed  = stage >= 2;
    const nextStage = stage + 1;
    const cost     = UPGRADE_COST[nextStage] || 0;
    const cap      = UPGRADE_STAT_CAP[nextStage] || 65;
    const color    = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const initial  = c.name.charAt(0);
    const hp       = c.hp_max || 10 * ((c.str_stat||0) + (c.agi_stat||0));
    const mastery  = (c.mastery_types||[]).join(' + ') || '무속성';
    const typeLabel= c.character_type === 'recruited' ? '영입' : '메이커';

    const stageDots = [0,1,2].map(s =>
      `<div class="stage-dot ${s < stage ? 'done' : s === stage ? 'current' : ''}"></div>`
    ).join('');

    const statBoxes = [
      ['힘', c.str_stat], ['민첩', c.agi_stat],
      ['지능', c.int_stat], ['지혜', c.wis_stat]
    ].map(([lbl, val]) => `
      <div class="upgrade-stat-box">
        <div class="upgrade-stat-lbl">${lbl}</div>
        <div class="upgrade-stat-val">${val}</div>
      </div>`).join('');

    const actionArea = isMaxed
      ? `<div class="upgrade-action">
           <span style="font-size:.75rem;color:var(--green);font-weight:600;">✓ 최대 강화 완료</span>
           <button class="upgrade-btn maxed" disabled>만렙</button>
         </div>`
      : `<div class="upgrade-action">
           <div class="upgrade-cost">
             <span>G</span>
             <span>${cost.toLocaleString()}G 필요</span>
             <span style="font-size:.68rem;color:var(--text3);margin-left:4px;">(스탯 상한 +${cap - UPGRADE_STAT_CAP[stage]})</span>
           </div>
           <div style="display:flex;gap:6px;">
             <button class="upgrade-btn" style="background:var(--blue);font-size:.72rem;" onclick="openSkillSwap(${c.id})">스킬 교체</button>
             <button class="upgrade-btn" onclick="doUpgrade(${c.id}, ${nextStage}, ${cost})">강화 ${nextStage}단계</button>
           </div>
         </div>`;

    return `
    <div class="upgrade-card" id="upgrade-card-${c.id}">
      <div class="upgrade-card-hdr">
        <div class="upgrade-avatar" style="background:${color}">${initial}</div>
        <div class="upgrade-info">
          <div class="upgrade-name">${c.name} <span style="font-size:.65rem;color:var(--text3);font-weight:400;">${typeLabel} · ${mastery}</span></div>
          <div class="upgrade-stage">
            강화 단계 ${stageDots}
            <span style="margin-left:4px;">${stage}/2</span>
            <span style="margin-left:8px;color:var(--text3);">HP ${hp.toLocaleString()}</span>
          </div>
        </div>
      </div>
      <div class="upgrade-stats">${statBoxes}</div>
      ${actionArea}
    </div>`;
  }).join('');
}

// ── 강화 실행 ────────────────────────────────────────────────────────────────
async function doUpgrade(charId, nextStage, cost) {
  const goldEl=document.getElementById('gold-amount');
  const curGold=parseInt((goldEl.textContent||'0').replace(/[^0-9]/g,''))||0;
  if(curGold<cost){showToast(`골드 부족 (${cost}G 필요 / ${curGold}G 보유)`);return;}
  _upgradeCharId=charId;_upgradeNextStage=nextStage;_upgradeCost=cost;
  ['str','agi','int','wis'].forEach(s=>{
    document.getElementById(`slider-${s}`).value=0;
    document.getElementById(`val-${s}`).textContent=0;
  });
  document.getElementById('points-left').textContent=15;
  document.getElementById('upgrade-confirm-btn').disabled=true;
  document.getElementById('upgrade-modal-title').textContent=`강화 ${nextStage}단계 — ${cost}G`;
  document.getElementById('upgrade-modal-overlay').classList.add('show');
}

function onSlider(){
  const s=+document.getElementById('slider-str').value,a=+document.getElementById('slider-agi').value;
  const i=+document.getElementById('slider-int').value,w=+document.getElementById('slider-wis').value;
  const used=s+a+i+w,left=15-used;
  if(left<0){
    const excess=-left,total=used;
    ['str','agi','int','wis'].forEach(k=>{
      const el=document.getElementById(`slider-${k}`);
      el.value=Math.max(0,+el.value-Math.ceil(excess*+el.value/total));
    });
  }
  const s2=+document.getElementById('slider-str').value,a2=+document.getElementById('slider-agi').value;
  const i2=+document.getElementById('slider-int').value,w2=+document.getElementById('slider-wis').value;
  document.getElementById('val-str').textContent=s2;document.getElementById('val-agi').textContent=a2;
  document.getElementById('val-int').textContent=i2;document.getElementById('val-wis').textContent=w2;
  const left2=15-(s2+a2+i2+w2);
  document.getElementById('points-left').textContent=left2;
  document.getElementById('upgrade-confirm-btn').disabled=left2!==0;
}

function closeUpgradeModal(){document.getElementById('upgrade-modal-overlay').classList.remove('show');}

async function confirmUpgrade(){
  const str_add=+document.getElementById('slider-str').value,agi_add=+document.getElementById('slider-agi').value;
  const int_add=+document.getElementById('slider-int').value,wis_add=+document.getElementById('slider-wis').value;
  closeUpgradeModal();
  try{
    const res=await fetch(`${API}/character/${_upgradeCharId}/upgrade`,{
      method:'PATCH',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`, 'ngrok-skip-browser-warning': '1' },
      body:JSON.stringify({str_add,int_add,wis_add,agi_add}),
    });
    const data=await res.json();
    if(!res.ok){showToast(data.detail||'강화 실패');return;}
    showToast(`✓ ${data.name} 강화 완료! (${_upgradeCost}G 소비)`);
    await loadCharacters();await loadGold();renderUpgradePanel();
  }catch{showToast('서버 오류');}
}

// 강화 슬라이더 모달 상태
let _upgradeCharId=null,_upgradeNextStage=null,_upgradeCost=null;

let characters = [];
let party      = [null, null, null];   // 파티 슬롯 3개


function showToast(msg, dur = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ── 캐릭터 로드 ─────────────────────────────────────────────────────────────
async function loadCharacters() {
  try {
    const res = await fetch(`${API}/character/me`, {
      headers: { 'Authorization': `Bearer ${token}`, 'ngrok-skip-browser-warning': '1' }
    });
    if (res.status === 401) { localStorage.clear(); location.href = 'auth.html'; return; }
    const data = await res.json();
    characters = data.characters || [];
    renderCharacters();
  } catch {
    showToast('캐릭터를 불러오지 못했습니다.');
    document.getElementById('char-grid').innerHTML =
      `<div class="empty-state">
        <div class="empty-title">서버에 연결할 수 없습니다</div>
        <div class="empty-sub">백엔드가 실행 중인지 확인해주세요</div>
      </div>`;
  }
}

// ── 렌더링 ──────────────────────────────────────────────────────────────────
function renderCharacters() {
  const grid = document.getElementById('char-grid');
  const cnt  = characters.length;
  document.getElementById('char-count').textContent =
    `${cnt}명의 캐릭터 보유 중`;

  if (cnt === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚔</div>
        <div class="empty-title">아직 캐릭터가 없어요</div>
        <div class="empty-sub">오른쪽 상단 버튼으로 첫 캐릭터를 만들어보세요</div>
      </div>`;
    return;
  }

  const MAX_STAT = 70;
  const cards = characters.map((c, i) => {
    const inParty   = party.findIndex(p => p?.id === c.id);
    const isRecruited = c.character_type === 'recruited';
    const initial   = c.name.charAt(0);
    const hp        = c.hp_max || 10 * ((c.str_stat || 0) + (c.agi_stat || 0));
    const masteries = (c.mastery_types || []).join(' · ') || '무속성';
    const growthLabel = ['초기', '강화 1회', '강화 2회'][c.growth_stage] || '초기';

    const partyBadge = inParty >= 0
      ? `<span class="char-badge badge-party">파티 ${inParty + 1}번</span>` : '';
    const typeBadge  = isRecruited
      ? `<span class="char-badge badge-recruited" style="top:${inParty>=0?'32':'10'}px">영입</span>`
      : `<span class="char-badge badge-maker" style="top:${inParty>=0?'32':'10'}px">메이커</span>`;

    const statBarColor = (val) => {
      const pct = Math.round((val / MAX_STAT) * 100);
      return `width:${pct}%`;
    };

    return `
    <div class="char-card ${inParty >= 0 ? 'in-party' : ''}"
         onclick="toggleParty(${c.id})"
         style="animation-delay:${i * 0.04}s">
      ${partyBadge}${typeBadge}
      <div class="char-avatar ${isRecruited ? 'avatar-recruited' : 'avatar-maker'}">${initial}</div>
      <div class="char-name">${c.name}</div>
      <div class="char-meta">${masteries} · ${growthLabel}</div>
      <div class="stat-bars">
        ${[['힘', c.str_stat], ['민', c.agi_stat], ['지', c.int_stat], ['혜', c.wis_stat]].map(([l, v]) => `
          <div class="stat-row">
            <span class="stat-label">${l}</span>
            <div class="stat-bar-bg"><div class="stat-bar-fill" style="${statBarColor(v)}"></div></div>
            <span class="stat-val">${v}</span>
          </div>`).join('')}
      </div>
      <div class="char-hp">
        <div class="char-hp-dot"></div>
        HP ${hp.toLocaleString()}
      </div>
    </div>`;
  });

  // 새 캐릭터 추가 버튼
  cards.push(`
    <button class="char-card-new" onclick="location.href='maker.html'">
      <div class="new-icon">+</div>
      <span class="new-label">새 캐릭터 만들기</span>
    </button>`);

  grid.innerHTML = cards.join('');
}

// ── 파티 토글 ───────────────────────────────────────────────────────────────
function toggleParty(charId) {
  const char    = characters.find(c => c.id === charId);
  if (!char) return;

  const inParty = party.findIndex(p => p?.id === charId);

  if (inParty >= 0) {
    // 파티에서 제거
    party[inParty] = null;
    showToast(`${char.name} 을(를) 파티에서 제외했습니다.`);
  } else {
    // 빈 슬롯 찾아서 추가
    const emptySlot = party.findIndex(p => p === null);
    if (emptySlot < 0) {
      showToast('파티 슬롯이 가득 찼습니다. (최대 3명)');
      return;
    }
    party[emptySlot] = char;
    showToast(`${char.name} 을(를) 파티 ${emptySlot + 1}번에 추가했습니다.`);
  }

  renderCharacters();
  renderParty();
  updatePartyInfo();
}

// ── 파티 슬롯 렌더 ──────────────────────────────────────────────────────────
function renderParty() {
  const filled = party.filter(Boolean).length;
  document.getElementById('party-count').textContent = `${filled} / 3`;
  document.getElementById('battle-btn').disabled = filled === 0;

  party.forEach((char, i) => {
    const slot = document.getElementById(`slot-${i}`);
    if (!slot) return;
    if (!char) {
      slot.className = 'party-slot empty';
      slot.innerHTML = `슬롯 ${i + 1} — 캐릭터를 클릭하여 추가`;
    } else {
      const hp  = char.hp_max || 10 * ((char.str_stat || 0) + (char.agi_stat || 0));
      const mas = (char.mastery_types || []).join('/') || '무속성';
      slot.className = 'party-slot filled';
      slot.innerHTML = `
        <div class="slot-num">${i + 1}</div>
        <div class="slot-info">
          <div class="slot-name">${char.name}</div>
          <div class="slot-meta">${mas} · HP ${hp.toLocaleString()}</div>
        </div>
        <button class="slot-remove" onclick="removeFromParty(${i}, event)">✕</button>`;
    }
  });
}

function removeFromParty(idx, e) {
  e.stopPropagation();
  const name = party[idx]?.name;
  party[idx] = null;
  if (name) showToast(`${name} 을(를) 파티에서 제외했습니다.`);
  renderCharacters();
  renderParty();
  updatePartyInfo();
}

// ── 파티 정보 ───────────────────────────────────────────────────────────────
function updatePartyInfo() {
  const filled = party.filter(Boolean);
  if (filled.length === 0) {
    document.getElementById('info-hp').textContent = '—';
    document.getElementById('info-atk').textContent = '—';
    document.getElementById('info-mastery').textContent = '—';
    document.getElementById('info-skills').textContent = '—';
    return;
  }
  const totalHp  = filled.reduce((s, c) => s + (c.hp_max || 10 * ((c.str_stat||0)+(c.agi_stat||0))), 0);
  const avgAtk   = Math.round(filled.reduce((s, c) => s + Math.max(c.str_stat||0, c.wis_stat||0), 0) / filled.length);
  const masteries= [...new Set(filled.flatMap(c => c.mastery_types || []))].join(', ') || '무속성';
  const skills   = filled.reduce((s, c) => s + (c.skill_ids?.length || 0), 0);

  document.getElementById('info-hp').textContent      = totalHp.toLocaleString();
  document.getElementById('info-atk').textContent     = avgAtk;
  document.getElementById('info-mastery').textContent = masteries;
  document.getElementById('info-skills').textContent  = `${skills}개`;
}

// ── 전투 시작 ───────────────────────────────────────────────────────────────
function startBattle() {
  const ids = party.filter(Boolean).map(c => c.id);
  if (ids.length === 0) return;
  localStorage.setItem('party_ids', JSON.stringify(ids));
  location.href = 'battle.html';
}

// ── 로그아웃 ─────────────────────────────────────────────────────────────────
async function handleLogout() {
  try {
    await fetch(`${API}/auth/logout`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'ngrok-skip-browser-warning': '1' }
    });
  } finally {
    localStorage.clear();
    location.href = 'auth.html';
  }
}

loadCharacters();
loadGold();

// ── 스킬 교체 ─────────────────────────────────────────────────────────────
let _swapCharId = null, _swapOldSkillId = null, _swapNewSkillId = null;
let _allSkillMeta = {};  // {id: skillData}

async function openSkillSwap(charId) {
  _swapCharId = charId;
  _swapOldSkillId = null;
  _swapNewSkillId = null;

  // 스킬 메타 로드 (없으면)
  if (!Object.keys(_allSkillMeta).length) {
    try {
      const res = await fetch(`${API}/character/meta/maker-skills`, {
        headers: { 'ngrok-skip-browser-warning': '1' }
      });
      const data = await res.json();
      (data.skills || []).forEach(s => { _allSkillMeta[s.id] = s; });
    } catch { showToast('스킬 정보 로드 실패'); return; }
  }

  const char = characters.find(c => c.id === charId);
  if (!char) return;

  document.getElementById('skill-swap-title').textContent = `${char.name} — 스킬 편성`;

  // 현재 장착 슬롯
  const slotRow = document.getElementById('skill-slot-row');
  slotRow.innerHTML = (char.skill_ids || []).map(sid => {
    const s = _allSkillMeta[sid];
    return `<button class="skill-slot-btn" id="slot-${sid}" onclick="selectSwapSlot(${sid})">
      <div class="skill-slot-name">${s ? s.name : `스킬 #${sid}`}</div>
      <div class="skill-slot-meta">${s ? `AP ${s.ap_cost} · ${s.skill_type}` : ''}</div>
    </button>`;
  }).join('');

  renderSkillPool(char);
  document.getElementById('skill-swap-confirm').disabled = true;
  document.getElementById('skill-swap-overlay').classList.add('show');
}

function selectSwapSlot(skillId) {
  _swapOldSkillId = skillId;
  _swapNewSkillId = null;
  document.querySelectorAll('.skill-slot-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(`slot-${skillId}`)?.classList.add('selected');
  document.getElementById('skill-swap-confirm').disabled = true;

  // 교체 가능 스킬 풀 갱신
  const char = characters.find(c => c.id === _swapCharId);
  renderSkillPool(char);
}

function renderSkillPool(char) {
  const grid = document.getElementById('skill-pool-grid');
  const equipped = char.skill_ids || [];
  // 1~20 전체에서 미장착 스킬
  const pool = Object.values(_allSkillMeta).filter(s => s.id >= 1 && s.id <= 20 && !equipped.includes(s.id));

  grid.innerHTML = pool.map(s => `
    <button class="skill-pool-btn" id="pool-${s.id}" onclick="selectNewSkill(${s.id})"
            ${!_swapOldSkillId ? 'disabled' : ''}>
      <div class="skill-slot-name">${s.name}</div>
      <div class="skill-slot-meta">AP ${s.ap_cost} · ${s.skill_type}</div>
    </button>`).join('');
}

function selectNewSkill(skillId) {
  _swapNewSkillId = skillId;
  document.querySelectorAll('.skill-pool-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById(`pool-${skillId}`)?.classList.add('selected');
  document.getElementById('skill-swap-confirm').disabled = !(_swapOldSkillId && _swapNewSkillId);
}

async function confirmSkillSwap() {
  if (!_swapCharId || !_swapOldSkillId || !_swapNewSkillId) return;
  try {
    const res = await fetch(
      `${API}/character/${_swapCharId}/swap-skill?old_skill_id=${_swapOldSkillId}&new_skill_id=${_swapNewSkillId}`,
      { method: 'PATCH', headers: { 'Authorization': `Bearer ${token}`, 'ngrok-skip-browser-warning': '1' } }
    );
    const data = await res.json();
    if (!res.ok) { showToast(data.detail || '교체 실패'); return; }
    showToast('✓ 스킬 교체 완료!');
    await loadCharacters();
    closeSkillSwap();
  } catch { showToast('서버 오류'); }
}

function closeSkillSwap() {
  document.getElementById('skill-swap-overlay').classList.remove('show');
}


// ── 상점 ─────────────────────────────────────────────────────────────────────
let shopItems=[];
async function renderShopPanel(){
  const grid=document.getElementById('shop-grid');if(!grid)return;
  if(!shopItems.length){
    try{const res=await fetch(`${API}/character/shop/items`,{headers:{'ngrok-skip-browser-warning':'1'}});const data=await res.json();shopItems=data.items||[];}
    catch{grid.innerHTML='<div style="color:var(--red)">상점 로드 실패</div>';return;}
  }
  const ICONS={'skill_scroll':'📜','recruit_ticket':'✨','recruit_enhance':'⚡'};
  const IC={'skill_scroll':'shop-icon-scroll','recruit_ticket':'shop-icon-recruit','recruit_enhance':'shop-icon-enhance'};
  grid.innerHTML=shopItems.map(item=>`<div class="shop-card"><div class="shop-card-hdr"><div class="shop-icon ${IC[item.id]||''}">${ICONS[item.id]||'🛒'}</div><div><div class="shop-item-name">${item.name}</div><div class="shop-item-desc">${item.desc}</div></div></div><div class="shop-item-footer"><div class="shop-price">G ${item.price.toLocaleString()}G${item.refund_dup?`<span class="shop-refund">(중복 ${item.refund_dup}G 반환)</span>`:''}</div><button class="shop-buy-btn" onclick="buyItem('${item.id}')">구매</button></div></div>`).join('');
}
async function buyItem(itemId){
  if(itemId==='recruit_enhance'){const r=characters.filter(c=>c.character_type==='recruited'&&(c.growth_stage||0)<2);if(!r.length){showToast('강화 가능한 영입 캐릭터 없음');return;}openEnhanceSelect(r);return;}
  const urls={skill_scroll:`${API}/character/shop/buy/skill-scroll`,recruit_ticket:`${API}/character/shop/buy/recruit-ticket`};
  const url=urls[itemId];if(!url)return;
  try{const res=await fetch(url,{method:'POST',headers:{'Authorization':`Bearer ${token}`,'ngrok-skip-browser-warning':'1'}});const data=await res.json();if(!res.ok){showToast(data.detail||'구매 실패');return;}showShopResult(itemId,data);await loadGold();await loadCharacters();}catch{showToast('서버 오류');}
}
function openEnhanceSelect(r){
  document.getElementById('enhance-select-list').innerHTML=r.map(c=>`<div class="enhance-select-item" onclick="buyEnhance(${c.id})">${c.name} <span style="color:var(--text3);font-size:.68rem;">강화 ${c.growth_stage||0}/2단계</span></div>`).join('');
  document.getElementById('enhance-select-overlay').classList.add('show');
}
async function buyEnhance(charId){
  closeEnhanceSelect();
  try{const res=await fetch(`${API}/character/shop/buy/recruit-enhance/${charId}`,{method:'POST',headers:{'Authorization':`Bearer ${token}`,'ngrok-skip-browser-warning':'1'}});const data=await res.json();if(!res.ok){showToast(data.detail||'구매 실패');return;}showShopResult('recruit_enhance',data);await loadGold();await loadCharacters();}catch{showToast('서버 오류');}
}
function closeEnhanceSelect(){document.getElementById('enhance-select-overlay').classList.remove('show');}
function showShopResult(itemId,data){
  const ICONS={'skill_scroll':'📜','recruit_ticket':'✨','recruit_enhance':'⚡'};
  document.getElementById('shop-result-icon').textContent=data.duplicate?'🔄':(ICONS[itemId]||'🎁');
  document.getElementById('shop-result-title').textContent=data.duplicate?'중복!':'획득!';
  document.getElementById('shop-result-msg').textContent=data.message||'';
  document.getElementById('shop-result-gold').textContent=`보유 골드: ${(data.gold||0).toLocaleString()}G`;
  document.getElementById('shop-result-overlay').classList.add('show');
}
function closeShopResult(){document.getElementById('shop-result-overlay').classList.remove('show');}

</script>
<!-- 강화 슬라이더 모달 -->

  <div class="upgrade-modal-card">
    <div class="upgrade-modal-title" id="upgrade-modal-title">강화</div>
    <div class="upgrade-points-left">남은 포인트: <strong id="points-left">15</strong> / 15</div>
    <div class="slider-row"><div class="slider-label">힘 <span id="val-str">0</span></div><input class="slider-input" type="range" id="slider-str" min="0" max="15" value="0" oninput="onSlider()"></div>
    <div class="slider-row"><div class="slider-label">민첩 <span id="val-agi">0</span></div><input class="slider-input" type="range" id="slider-agi" min="0" max="15" value="0" oninput="onSlider()"></div>
    <div class="slider-row"><div class="slider-label">지능 <span id="val-int">0</span></div><input class="slider-input" type="range" id="slider-int" min="0" max="15" value="0" oninput="onSlider()"></div>
    <div class="slider-row"><div class="slider-label">지혜 <span id="val-wis">0</span></div><input class="slider-input" type="range" id="slider-wis" min="0" max="15" value="0" oninput="onSlider()"></div>
    <div class="upgrade-modal-btns">
      <button class="upgrade-modal-btn cancel" onclick="closeUpgradeModal()">취소</button>
      <button class="upgrade-modal-btn confirm" id="upgrade-confirm-btn" onclick="confirmUpgrade()" disabled>강화하기</button>
    </div>
  </div>
</div>
<div class="shop-result-overlay" id="shop-result-overlay">
  <div class="shop-result-card">
    <div class="shop-result-icon" id="shop-result-icon">🎁</div>
    <div class="shop-result-title" id="shop-result-title">획득!</div>
    <div class="shop-result-msg" id="shop-result-msg"></div>
    <div class="shop-result-gold" id="shop-result-gold"></div>
    <button class="shop-result-close" onclick="closeShopResult()">확인</button>
  </div>
</div>
<div class="shop-result-overlay" id="enhance-select-overlay">
  <div class="shop-result-card">
    <div class="shop-result-title">강화할 캐릭터 선택</div>
    <div class="enhance-select-list" id="enhance-select-list"></div>
    <button class="shop-result-close" onclick="closeEnhanceSelect()" style="background:var(--text3);margin-top:8px;">취소</button>
  </div>
</div>
<!-- 스킬 교체 모달 -->
<div class="skill-swap-overlay" id="skill-swap-overlay">
  <div class="skill-swap-card">
    <div class="skill-swap-title" id="skill-swap-title">스킬 편성 변경</div>
    <div class="skill-swap-sub">교체할 슬롯을 선택한 뒤, 새 스킬을 선택하세요.</div>
    <div class="skill-swap-section">
      <div class="skill-swap-label">현재 장착 스킬</div>
      <div class="skill-slot-row" id="skill-slot-row"></div>
    </div>
    <div class="skill-swap-section">
      <div class="skill-swap-label">교체 스킬 선택</div>
      <div class="skill-pool-grid" id="skill-pool-grid"></div>
    </div>
    <div class="skill-swap-btns">
      <button class="skill-swap-btn cancel" onclick="closeSkillSwap()">닫기</button>
      <button class="skill-swap-btn confirm" id="skill-swap-confirm" onclick="confirmSkillSwap()" disabled>교체</button>
    </div>
  </div>
</div>
